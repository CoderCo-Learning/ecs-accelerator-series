name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "ECR repository name"
        required: true
        type: string
      dockerfile:
        description: "Path to Dockerfile"
        required: false
        type: string
        default: "Dockerfile"
      context:
        description: "Docker build context"
        required: false
        type: string
        default: "."
      aws_region:
        description: "AWS region"
        required: false
        type: string
        default: "eu-west-1"
      severity_cutoff:
        description: "Grype severity cutoff (negligible, low, medium, high, critical)"
        required: false
        type: string
        default: "high"
    secrets:
      AWS_ROLE_ARN:
        required: true
    outputs:
      image_uri:
        description: "Full ECR image URI including SHA tag"
        value: ${{ jobs.build.outputs.image }}

jobs:
  build:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.uri }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        run: |
          IMAGE="${{ steps.ecr.outputs.registry }}/${{ inputs.image_name }}:${{ github.sha }}"
          docker build -t "$IMAGE" -f ${{ inputs.dockerfile }} ${{ inputs.context }}
          # Also tag as latest for convenience
          docker tag "$IMAGE" "${{ steps.ecr.outputs.registry }}/${{ inputs.image_name }}:latest"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Scan with Grype
        uses: anchore/scan-action@v3
        with:
          image: ${{ steps.build.outputs.image }}
          fail-build: true
          severity-cutoff: ${{ inputs.severity_cutoff }}

      - name: Push to ECR
        id: push
        run: |
          docker push "${{ steps.build.outputs.image }}"
          docker push "${{ steps.ecr.outputs.registry }}/${{ inputs.image_name }}:latest"
          echo "uri=${{ steps.build.outputs.image }}" >> $GITHUB_OUTPUT

      - name: Build summary
        run: |
          echo "### Build & Push Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ steps.build.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Dockerfile:** \`${{ inputs.dockerfile }}\`" >> $GITHUB_STEP_SUMMARY
