name: CI - Build API

# Example: how to call the reusable docker build workflow
# This is what each application repo's CI pipeline would look like

on:
  push:
    branches: [main]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------
  # Job 1: Call the reusable build workflow
  # Notice: uses: instead of runs-on: + steps:
  # The entire job is delegated to the reusable workflow
  # -----------------------------------------------------------------
  build:
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      image_name: my-api
      dockerfile: Dockerfile
      severity_cutoff: high
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  # -----------------------------------------------------------------
  # Job 2: Deploy after successful build
  # Calls the reusable ECS deploy workflow from Episode 12
  # -----------------------------------------------------------------
  deploy:
    needs: build
    uses: ./.github/workflows/reusable-ecs-deploy.yml
    with:
      cluster: production
      service: my-api
      container_name: api
      image: ${{ needs.build.outputs.image_uri }}
