name: "Docker Build & Scan"
description: "Builds a Docker image and scans it for vulnerabilities with Grype"

inputs:
  image_name:
    description: "Name for the Docker image (e.g. my-app)"
    required: true
  dockerfile:
    description: "Path to Dockerfile"
    required: false
    default: "Dockerfile"
  context:
    description: "Docker build context"
    required: false
    default: "."
  severity_cutoff:
    description: "Minimum severity to fail on (negligible, low, medium, high, critical)"
    required: false
    default: "high"

outputs:
  image_tag:
    description: "The full image:tag that was built"
    value: ${{ steps.build.outputs.tag }}
  scan_report:
    description: "Path to the Grype scan report"
    value: ${{ steps.scan.outputs.sarif }}

runs:
  using: "composite"
  steps:
    - name: Build Docker image
      id: build
      shell: bash
      run: |
        TAG="${{ inputs.image_name }}:${{ github.sha }}"
        echo "Building $TAG from ${{ inputs.dockerfile }}"
        docker build \
          -t "$TAG" \
          -f ${{ inputs.dockerfile }} \
          ${{ inputs.context }}
        echo "tag=$TAG" >> $GITHUB_OUTPUT
        echo "Built image: $TAG"

    - name: Scan with Grype
      id: scan
      uses: anchore/scan-action@v3
      with:
        image: ${{ steps.build.outputs.tag }}
        fail-build: true
        severity-cutoff: ${{ inputs.severity_cutoff }}
        output-format: sarif

    - name: Scan summary
      if: always()
      shell: bash
      run: |
        echo "### Container Scan Results" >> $GITHUB_STEP_SUMMARY
        echo "**Image:** \`${{ steps.build.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
        echo "**Severity cutoff:** ${{ inputs.severity_cutoff }}" >> $GITHUB_STEP_SUMMARY
        if [ "${{ steps.scan.outcome }}" = "success" ]; then
          echo "**Result:** Passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "**Result:** Failed - vulnerabilities found above threshold" >> $GITHUB_STEP_SUMMARY
        fi
